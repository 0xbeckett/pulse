<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <meta name="theme-color" content="#05010f" />
  <meta name="description" content="Pulse — a one-thumb neon endless arcade game. Tap and hold to weave through the gauntlet." />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Pulse" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <title>Pulse</title>
  <style>
    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #05010f;
      color: #eaf6ff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
      overscroll-behavior: none;
    }
    #stage {
      position: fixed;
      inset: 0;
      display: block;
      touch-action: none;
    }
    #canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }
    /* Mute button lives outside the canvas so it respects safe areas natively. */
    #mute {
      position: fixed;
      top: calc(var(--safe-top) + 12px);
      right: calc(var(--safe-right) + 12px);
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 12px;
      background: rgba(10, 6, 30, 0.55);
      color: #7df9ff;
      font-size: 20px;
      line-height: 44px;
      text-align: center;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 10;
      cursor: pointer;
    }
    #mute:active { transform: scale(0.92); }
    #rotate {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      background: #05010f;
      z-index: 20;
      font-size: 18px;
      color: #7df9ff;
    }
    /* Nudge to portrait on landscape phones. */
    @media (orientation: landscape) and (max-height: 520px) {
      #rotate { display: flex; }
    }
  </style>
</head>
<body>
  <div id="stage">
    <canvas id="canvas"></canvas>
  </div>
  <button id="mute" aria-label="Toggle sound">♪</button>
  <div id="rotate">↻ Rotate your device to portrait to play Pulse</div>
  <script type="module" src="__BUNDLE__"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
